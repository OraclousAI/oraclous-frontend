# nginx site for the marketing app + Eurail workspace.
# If you already have a server block for the domain (with certbot SSL), you only need to:
#   1) change its `root` to /var/www/oraclous-marketing
#   2) add the `location /eurail/api/` block below
# This file is the full reference shape otherwise.

server {
    listen 80;
    listen [::]:80;
    server_name oraclous.com www.oraclous.com; # ← adjust; certbot upgrades this block to 443

    root /var/www/oraclous-marketing;
    index index.html;

    # Astro static output: /about → /about/index.html
    location / {
        try_files $uri $uri/index.html =404;
    }

    # The Eurail API sidecar (auth gate / grounded chat / history).
    # proxy_buffering MUST stay off — the chat reply is a long-lived plain-text stream.
    location /eurail/api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Immutable fingerprinted assets.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
