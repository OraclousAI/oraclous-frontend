name: CI — Frontend

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-fe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # quality: lint, type-check, format — base hygiene for every PR
  # (ESLint + Prettier now cover *.astro via eslint-plugin-astro / prettier-plugin-astro;
  #  typecheck runs each package's checker — apps/marketing uses `astro check`.)
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint / Type-check / Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 1 — api-client-boundary
  #
  # All HTTP to the Application Gateway must go through @oraclous/api-client.
  # Raw fetch() / axios calls in feature code (apps/, or packages/ outside
  # packages/api-client) bypass the typed contract and are rejected.
  #
  # Scope: *.ts, *.tsx, *.astro in apps/ and packages/ (excluding packages/api-client
  # itself, node_modules, and test files).
  # ─────────────────────────────────────────────────────────────────────────────
  gate-api-client-boundary:
    name: 'Gate 1: api-client-boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject bare fetch/axios outside packages/api-client
        run: |
          violations=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.astro" \
            -E "(^|[^a-zA-Z_])(fetch\s*\(|axios\b)" \
            apps/ packages/ \
            --exclude-dir=packages/api-client \
            --exclude-dir=node_modules \
            --exclude="*.test.ts" \
            --exclude="*.test.tsx" \
            --exclude="*.spec.ts" \
            --exclude="*.spec.tsx" \
            2>/dev/null || true)
          # Also catch "import ... from 'axios'" or "import('axios')"
          import_violations=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.astro" \
            -E "from ['\"]axios['\"]|require\(['\"]axios['\"]\)" \
            apps/ packages/ \
            --exclude-dir=packages/api-client \
            --exclude-dir=node_modules \
            2>/dev/null || true)
          all="$violations"$'\n'"$import_violations"
          all=$(echo "$all" | sed '/^[[:space:]]*$/d')
          if [ -n "$all" ]; then
            echo "❌ api-client-boundary violated — direct fetch/axios detected outside packages/api-client:"
            echo "$all"
            exit 1
          fi
          echo "✅ api-client-boundary clean"

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 2 — no-token-in-storage
  #
  # Auth tokens (integration key, session token, agent credential) must never
  # be placed in localStorage or sessionStorage directly. Feature code must call
  # the platform's storage primitives; direct Web Storage writes are rejected.
  #
  # Scope: *.ts, *.tsx, *.astro everywhere in apps/ and packages/ (excluding
  # node_modules and test files so that test fixtures can exercise storage primitives).
  # ─────────────────────────────────────────────────────────────────────────────
  gate-no-token-in-storage:
    name: 'Gate 2: no-token-in-storage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject direct localStorage/sessionStorage usage in feature code
        run: |
          # Filter out comment lines (grep -n output: "file:line:content") to avoid
          # false positives from doc-strings or comments that mention the banned APIs.
          violations=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.astro" \
            -E "(localStorage|sessionStorage)\s*\." \
            apps/ packages/ \
            --exclude-dir=node_modules \
            --exclude="*.test.ts" \
            --exclude="*.test.tsx" \
            --exclude="*.spec.ts" \
            --exclude="*.spec.tsx" \
            2>/dev/null | grep -vE ":[[:digit:]]+:[[:space:]]*//" || true)
          if [ -n "$violations" ]; then
            echo "❌ no-token-in-storage violated — direct localStorage/sessionStorage usage in feature code:"
            echo "$violations"
            exit 1
          fi
          echo "✅ no-token-in-storage clean"

      - name: Reject IndexedDB usage outside the session vault
        run: |
          # CLAUDE.md §1.5: the session vault (apps/console/src/lib/session-vault.ts) is the ONE
          # sanctioned persistence path for the ONE credential allowed to persist (the rotating
          # refresh token). Any other IndexedDB use — direct or via the idb package — needs a
          # deliberate §1.5 change, not a quiet import.
          violations=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.astro" \
            -E "(indexedDB|IDBDatabase|from ['\"]idb['\"])" \
            apps/ packages/ \
            --exclude-dir=node_modules \
            --exclude="session-vault.ts" \
            --exclude="*.test.ts" \
            --exclude="*.test.tsx" \
            --exclude="*.spec.ts" \
            --exclude="*.spec.tsx" \
            2>/dev/null | grep -vE ":[[:digit:]]+:[[:space:]]*//" || true)
          if [ -n "$violations" ]; then
            echo "❌ IndexedDB usage outside apps/console/src/lib/session-vault.ts:"
            echo "$violations"
            exit 1
          fi
          echo "✅ vault-only persistence clean"

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 3 — axe-core AA
  #
  # Every UI page must pass WCAG AA via axe-core automated scan. The marketing
  # specs (tests/a11y/marketing/) run against the built static site, served by
  # `astro preview` (Playwright webServer). Console specs land later.
  # ─────────────────────────────────────────────────────────────────────────────
  gate-axe-core-aa:
    name: 'Gate 3: axe-core AA'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build marketing (a11y scans the static build)
        run: pnpm --filter @oraclous/marketing build

      - name: Install Playwright browsers (Chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: axe-core AA scan
        run: pnpm test:a11y

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 4 — bundle-budget
  #
  # Production bundles in apps/*/dist/ must not exceed 500 KB gzipped per JS
  # entrypoint. The gate passes trivially on a greenfield scaffold with no
  # built apps; once apps ship, every PR that grows a bundle over the cap blocks.
  #
  # Cap: 512 000 bytes (~500 KB) gzipped per JS file under apps/*/dist/.
  # To adjust the cap, update BUNDLE_CAP_BYTES below and record the decision
  # in a PR comment; significant cap bumps warrant a CTO review.
  # ─────────────────────────────────────────────────────────────────────────────
  gate-bundle-budget:
    name: 'Gate 4: bundle-budget'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: pnpm build

      - name: Check bundle size cap (500 KB gzipped per entrypoint)
        run: |
          BUNDLE_CAP_BYTES=512000
          bundles=$(find apps -name "*.js" -path "*/dist/*" 2>/dev/null | sort)
          if [ -z "$bundles" ]; then
            echo "✅ bundle-budget: no production bundles yet — gate passed (greenfield)"
            exit 0
          fi
          failed=0
          while IFS= read -r file; do
            gz_bytes=$(gzip -c "$file" | wc -c)
            kb=$(( gz_bytes / 1024 ))
            if [ "$gz_bytes" -gt "$BUNDLE_CAP_BYTES" ]; then
              echo "❌ OVER CAP: $file — ${kb} KB gzipped (cap $((BUNDLE_CAP_BYTES / 1024)) KB)"
              failed=1
            else
              echo "✅ $file — ${kb} KB gzipped"
            fi
          done <<< "$bundles"
          exit $failed

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 5 — no-dangerouslySetInnerHTML (.ts/.tsx) + no uncontrolled set:html (.astro)
  #
  # dangerouslySetInnerHTML bypasses React's XSS protections and is statically
  # banned. In Astro, set:html is the equivalent sink; the ONLY allowed uses are the
  # controlled JSON-LD emitters, which serialise build-time data (front-matter / site
  # constants), never user input (build-spec §4.2). Any other set:html is rejected.
  # ─────────────────────────────────────────────────────────────────────────────
  gate-no-dangerous-html:
    name: 'Gate 5: no-dangerouslySetInnerHTML / set:html'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject dangerouslySetInnerHTML (.ts/.tsx) and uncontrolled set:html (.astro)
        run: |
          # Approved .tsx exception: packages/design-system/src/components/ui/chart.tsx
          # (ShadCN recharts primitive — injects only controlled CSS theme tokens).
          react_violations=$(grep -rn --include="*.ts" --include="*.tsx" \
            "dangerouslySetInnerHTML" \
            apps/ packages/ \
            --exclude-dir=node_modules \
            2>/dev/null | grep -v "packages/design-system/src/components/ui/chart.tsx" || true)
          # Approved .astro exceptions: controlled JSON-LD emitters only.
          astro_violations=$(grep -rn --include="*.astro" \
            "set:html" \
            apps/ packages/ \
            --exclude-dir=node_modules \
            2>/dev/null | grep -vE "apps/marketing/src/components/SchemaJsonLd.astro|apps/marketing/src/pages/glossary/index.astro|apps/marketing/src/pages/glossary/\[slug\].astro" || true)
          all="$react_violations"$'\n'"$astro_violations"
          all=$(echo "$all" | sed '/^[[:space:]]*$/d')
          if [ -n "$all" ]; then
            echo "❌ no-dangerouslySetInnerHTML / uncontrolled set:html violated:"
            echo "$all"
            exit 1
          fi
          echo "✅ no-dangerouslySetInnerHTML / set:html clean"

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 6 — internal-link-check (marketing)
  #
  # The marketing corpus is link-dense; a broken internal link is an SEO/UX
  # regression. After building, assert every root-relative href resolves to a
  # built page/asset (scripts/check-internal-links.mjs). 0 broken or the gate fails.
  # ─────────────────────────────────────────────────────────────────────────────
  gate-link-check:
    name: 'Gate 6: internal-link-check (marketing)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build marketing
        run: pnpm --filter @oraclous/marketing build

      - name: Check internal links
        run: pnpm link-check

  # ─────────────────────────────────────────────────────────────────────────────
  # Lighthouse / Core Web Vitals (marketing) — the GEO-critical performance gate.
  # Asserts a11y and surfaces perf/SEO/best-practices budgets on the static build.
  # Starts mostly-advisory (perf/seo/best-practices = warn); tighten + promote to a
  # required check once baselines are observed (build-spec §7).
  # ─────────────────────────────────────────────────────────────────────────────
  lighthouse-marketing:
    name: 'Lighthouse / CWV (marketing)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build marketing
        run: pnpm --filter @oraclous/marketing build

      - name: Lighthouse CI
        run: pnpm exec lhci autorun --config=lighthouserc.json
